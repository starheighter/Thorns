<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-dot"></span>
                    <span class="logo-text">LLAMA</span>
                </div>
                <div class="model-badge">llama3.2 · local</div>
            </div>
            <div class="header-right">
                <div class="memory-indicator" id="memoryIndicator" title="Messages in memory">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" />
                        <path d="M12 6v6l4 2" />
                    </svg>
                    <span id="memoryCount">0</span>/10
                </div>
                <button class="reset-btn" id="resetBtn" title="Clear conversation">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                    Reset
                </button>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">◈</div>
                <h1>What's on your mind?</h1>
                <p>Ask me anything. I remember the last 10 messages.</p>
            </div>
        </main>

        <div class="input-bar">
            <div class="input-wrapper">
                <textarea id="myInput" placeholder="Type a message…" rows="1" autocomplete="off"></textarea>
                <button id="sendBtn" onclick="chat()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <p class="disclaimer">Sliding memory · last 10 messages · runs locally</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
